<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Anexos – Debido Proceso MEP</title>
<style>
@font-face{font-family:'Henderson Sans Basic';src:url('Logo/Henderson Sans Basic Light.ttf') format('truetype');font-weight:300}
@font-face{font-family:'Henderson Sans Basic';src:url('Logo/Henderson Sans Basic SemiBd.ttf') format('truetype');font-weight:600}
@font-face{font-family:'Henderson Sans Basic';src:url('Logo/Henderson Sans Basic Bold.ttf') format('truetype');font-weight:700}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1c2847;--azul-cl:#273966;--rojo:#C8102E;--oro:#C9A86A;
  --gris:#f0f4f9;--borde:#cbd5e0;--texto:#0f1a2e;--blanco:#fff;
  --sombra:0 4px 24px rgba(28,40,71,.13);
}
body, input, select, textarea, button {font-family:'Henderson Sans Basic',sans-serif;}
body{background:var(--gris);color:var(--texto);min-height:100vh}

#topbar{background:var(--azul);color:var(--blanco);display:flex;align-items:center;
  gap:.75rem;padding:0 1.5rem;height:54px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,.35)}
#topbar .brand{font-size:.9rem;font-weight:800;letter-spacing:.05em;color:var(--oro);margin-right:auto}
#topbar button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:var(--blanco);padding:.3rem .9rem;border-radius:6px;font-size:.78rem;
  font-weight:600;cursor:pointer;transition:background .2s;font-family:'Henderson Sans Basic',sans-serif}
#topbar button:hover{background:rgba(255,255,255,.25)}
.btn-gold{background:var(--oro)!important;color:var(--azul)!important;border-color:var(--oro)!important}
.btn-gold:hover{background:#e0a800!important}

#case-nav{background:#1a3a6b;color:var(--blanco);display:flex;align-items:center;
  gap:.35rem;padding:.5rem 1.5rem;flex-wrap:wrap;border-bottom:2px solid var(--azul)}
.case-nav-title{font-size:.75rem;font-weight:700;color:var(--oro);white-space:nowrap;margin-right:.5rem}
.page-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.85);padding:.28rem .7rem;border-radius:5px;font-size:.72rem;
  font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Henderson Sans Basic',sans-serif}
.page-btn:hover{background:rgba(255,255,255,.2)}
.page-btn.active{background:var(--oro);color:var(--azul);border-color:var(--oro)}

#app{display:grid;grid-template-columns:390px 1fr;gap:0;min-height:calc(100vh - 54px)}
#panel-form{background:var(--blanco);border-right:2px solid var(--borde);overflow-y:auto}
.panel-head{background:linear-gradient(135deg,var(--azul),var(--azul-cl));color:var(--blanco);padding:1.1rem 1.3rem}
.panel-head h2{font-size:1rem;font-weight:700}
.panel-head p{font-size:.75rem;opacity:.8}
.panel-body{padding:1.1rem;display:flex;flex-direction:column;gap:1.5rem}

.sec{border:1.5px solid var(--borde);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.sec-hdr{background:var(--gris);padding:.55rem .9rem;font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--azul)}
.sec-body{padding:.85rem .9rem;display:flex;flex-direction:column;gap:.75rem}

.fg{display:flex;flex-direction:column;gap:.3rem}
.fg label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:#555}
.fg input{border:1.5px solid var(--borde);border-radius:7px;padding:.45rem .75rem;font-size:.83rem;font-family:'Henderson Sans Basic',sans-serif}

.anexo-card{background:#f8faff;border:1.5px solid #dde6fa;border-radius:8px;padding:.65rem .75rem;position:relative;margin-bottom:.5rem}
.remove-btn{position:absolute;top:.4rem;right:.4rem;background:none;border:none;cursor:pointer;color:#aaa;font-size:.8rem}
.remove-btn:hover{color:var(--rojo)}

#panel-preview{background:#dde3ed;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.carta{width:21.59cm;height:27.94cm;background:white url('fondo.png') no-repeat top center;background-size:100% auto;box-shadow:var(--sombra);border-radius:3px;overflow:hidden;flex-shrink:0}
.carta-inner{padding:3.2cm 2.2cm 2cm 2.5cm;height:100%;display:flex;flex-direction:column;overflow:hidden}
.folio-line{display:flex;justify-content:flex-end;font-size:7.5pt;color:#555;margin-bottom:.4cm}
.folio-line b{color:var(--azul)}

.preview-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#8898aa;align-self:flex-start}

@media print{
  @page{size:letter;margin:0}
  html,body{margin:0;padding:0;background:white!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  #topbar,#panel-form,.preview-label,#case-nav{display:none!important}
  #app{display:block;margin:0;padding:0;width:100%}
  #panel-preview{display:block!important;padding:0;background:white!important;width:100%}
  .carta{width:21.59cm!important;height:27.94cm!important;box-shadow:none!important;
    page-break-after:always;break-after:page;border:none!important;
    background-image:url('fondo.png')!important;background-size:100% auto!important;
    -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .carta:last-child{page-break-after:auto!important;break-after:auto!important}
}
</style>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
<header id="topbar">
  <span class="brand">📋 Anexos del Expediente</span>
  <button onclick="irIndice()">← Regresar</button>
  <button class="btn-gold" style="margin-left:1rem;font-weight:700" onclick="window.print()">🖨 Imprimir Anexos</button>
</header>
<nav id="case-nav">
  <span class="case-nav-title">Expediente</span>
  <button class="page-btn" onclick="irIndice('portada')">1. Portada</button>
  <button class="page-btn" onclick="irIndice('tdc')">2. Tabla Contenidos</button>
  <button class="page-btn" onclick="irPaso1()">3. Com. Prof. Guía</button>
  <button class="page-btn" onclick="irPaso2()">4. Notif. Testigos</button>
  <button class="page-btn" onclick="irPaso3()">5–6. Actas/Declara.</button>
  <button class="page-btn active" onclick="irAnexos()">7. Anexos</button>
  <button class="page-btn" onclick="irPaso4()">8. Resultado Inv.</button>
  <button class="page-btn" onclick="irPaso5()">9. Notif. Apertura</button>
  <button class="page-btn" onclick="irPaso6()">10. Boleta Apertura</button>
  <button class="page-btn" onclick="irPaso7()">11. Solicitud Copia</button>
  <button class="page-btn" onclick="irPaso9()">12. Descargos y Pruebas</button>
  <button class="page-btn" onclick="irPaso8()">13. Dec. Estudiante</button>
</nav>
<div id="app">
  <aside id="panel-form">
    <div class="panel-head"><h2>📎 Gestión de Anexos</h2><p>Documentos probatorios del proceso</p></div>
    <div class="panel-body">
      <div class="sec">
        <div class="sec-hdr">Subir nuevo anexo</div>
        <div class="sec-body">
           <input type="file" id="file-input" multiple onchange="subirArchivos(event)"/>
        </div>
      </div>
      <div id="lista-anexos-form"></div>
    </div>
  </aside>
  <main id="panel-preview">
    <div class="preview-label">Vista previa - Tamaño carta</div>
    <div id="cartas-display" style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;width:100%"></div>
  </main>
</div>

<script>
const LS_CASOS = 'mep_dp_casos_v2';
const LS_ANEXOS = 'mep_dp_anexos_v1';
let caso = null;
let anexos = [];

function init(){
  const id = new URLSearchParams(location.search).get('id');
  const casos = JSON.parse(localStorage.getItem(LS_CASOS)) || [];
  caso = id ? casos.find(c=>c.id===id) : casos[0];
  
  // Cargar anexos específicos del caso
  const key = LS_ANEXOS + (caso ? '_'+caso.id : '');
  try {
    anexos = JSON.parse(localStorage.getItem(key)) || [];
  } catch(e) {
    anexos = [];
  }
  
  // Si no hay anexos específicos, intentar migrar los de paso1
  if(!anexos.length && caso){
     const keyP1 = 'mep_dp_paso1_v1_' + caso.id;
     try {
       const d1 = JSON.parse(localStorage.getItem(keyP1));
       if(d1 && d1.anexos) {
          anexos = d1.anexos;
          guardar();
       }
     } catch(e){}
  }

  renderForm();
  renderPreview();
}

function subirArchivos(e){
  Array.from(e.target.files).forEach(f=>{
    anexos.push({nombre:f.name,descripcion:'',tipo:f.type,fecha:new Date().toLocaleDateString()});
  });
  guardar();
  renderForm();
  renderPreview();
}

function eliminarAnexo(i){
  if(!confirm('¿Eliminar este anexo?')) return;
  anexos.splice(i,1);
  guardar();
  renderForm();
  renderPreview();
}

function guardar(){
  const key = LS_ANEXOS + (caso ? '_'+caso.id : '');
  localStorage.setItem(key, JSON.stringify(anexos));
}

function renderForm(){
  const c = document.getElementById('lista-anexos-form');
  if(!anexos.length){
    c.innerHTML = '<p style="text-align:center;color:#aaa;font-size:.8rem;padding:2rem">No hay anexos subidos.</p>';
    return;
  }
  c.innerHTML = anexos.map((a,i)=>`
    <div class="anexo-card">
      <button class="remove-btn" onclick="eliminarAnexo(${i})">✕</button>
      <div style="font-size:.8rem;font-weight:700;color:var(--azul-cl)">📄 ${escH(a.nombre)}</div>
      <div class="fg" style="margin-top:.4rem">
        <label>Descripción del documento</label>
        <input type="text" value="${escH(a.descripcion||'')}" placeholder="Anexo ${i+1}: descripción..." oninput="anexos[${i}].descripcion=this.value;guardar();renderPreview()"/>
      </div>
    </div>`).join('');
}

function escH(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderPreview(){
  const out = document.getElementById('cartas-display');
  out.innerHTML = '';
  
  if(!anexos.length){
    out.innerHTML = '<p style="color:#aaa;font-style:italic;text-align:center;padding:3rem">No hay anexos registrados para visualizar.</p>';
    return;
  }

  const exp = caso?.expediente||'—';
  const anio = caso?.anio||'2026';

  // Portada de anexos
  const p = document.createElement('article');
  p.className = 'carta';
  p.innerHTML = `<div class="carta-inner" style="align-items:center;justify-content:center;text-align:center">
    <div class="folio-line" style="width:100%">Exp. N.° <b>${exp}</b> · Año <b>${anio}</b></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <h1 style="font-size:32pt;color:var(--azul);text-transform:uppercase;letter-spacing:.05em">ANEXOS</h1>
      <p style="font-size:12pt;color:var(--rojo);font-weight:700;margin-top:.5rem">DOCUMENTOS PROBATORIOS DEL PROCESO</p>
      <hr style="width:10cm;border:none;border-top:3px solid var(--azul);margin:1cm 0"/>
      <div style="text-align:left;width:100%;max-width:14cm;font-size:11pt;line-height:1.6">
        ${anexos.map((a,i)=>`<div style="margin-bottom:.4cm;padding-left:.5cm;border-left:3px solid var(--oro)">
          <b style="color:var(--azul)">Anexo ${i+1}:</b> ${escH(a.descripcion||a.nombre)}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
  out.appendChild(p);

  // Páginas individuales
  anexos.forEach((a,i)=>{
    const art = document.createElement('article');
    art.className = 'carta';
    art.innerHTML = `<div class="carta-inner">
      <div class="folio-line">Exp. N.° <b>${exp}</b> · Año <b>${anio}</b> · Anexo ${i+1}</div>
      <h2 style="text-align:center;color:var(--azul);text-transform:uppercase;margin-bottom:1cm;font-size:14pt">Anexo ${i+1}</h2>
      <div style="background:#f0f6ff;padding:1cm;border-radius:10px;border:2px solid var(--azul);margin-bottom:1cm">
        <label style="font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--azul);display:block;margin-bottom:.3rem">Descripción del documento:</label>
        <div style="font-size:11.5pt;line-height:1.6">${escH(a.descripcion||'(Sin descripción)')}</div>
      </div>
      <div style="background:#fafbfc;border:1.5px dashed var(--borde);padding:1cm;border-radius:10px;text-align:center;color:#888;font-size:10pt">
        <p>📄 Archivo asociado: <b style="color:var(--azul)">${escH(a.nombre)}</b></p>
        <p style="margin-top:.5cm">[ El documento impreso original debe ser adjuntado físicamente debajo de este folio ]</p>
      </div>
    </div>`;
    out.appendChild(art);
  });
}

function trySave() {
  if (typeof guardar === 'function') {
    try { guardar(true); } catch(e){}
  } else if (typeof guardarDatos === 'function') {
    try { guardarDatos(true); } catch(e){}
  }
}
function irIndice(pag) { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './index.html?id=' + (id||'') + '&page=' + (pag||'portada'); }
function irPaso1() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso1.html' + (id ? '?id='+id : ''); }
function irPaso2() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso2.html' + (id ? '?id='+id : ''); }
function irPaso3() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso3.html' + (id ? '?id='+id : ''); }
function irPaso4() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso4.html' + (id ? '?id='+id : ''); }
function irPaso5() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso5.html' + (id ? '?id='+id : ''); }
function irPaso6() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso6.html' + (id ? '?id='+id : ''); }
function irPaso7() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso7.html' + (id ? '?id='+id : ''); }
function irPaso8() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso8.html' + (id ? '?id='+id : ''); }
function irPaso9() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './paso9.html' + (id ? '?id='+id : ''); }
function irAnexos() { trySave(); const id = new URLSearchParams(location.search).get('id'); location.href = './anexos.html' + (id ? '?id='+id : ''); }

init();
</script>
</body>
</html>
